<!DOCTYPE html>
<html lang="en">
<head>
    <title>NONGOR | Mount Cook</title>
    <link rel="icon" type="image/jpeg" href="img/nongor_logo-removebg-preview - Edited.png">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<!--Navbar-->
<body class="mt-0">
    <header class="nav-bar">
        <nav class="navbar navbar-expand-lg shadow mb-4">
            <div class="container-fluid">
                <a class="navbar-brand" href="index.html">
                    <img src="img/nongor_logo-removebg-preview.png" alt="Logo" class="d-inline-block align-text-top nav-logo">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                    <div class="navbar-nav">
                        <a class="nav-link" href="index.html">Home</a>
                        <a class="nav-link" href="tour.html">Tours</a>
                        <a class="nav-link" href="about.html">About Us</a>
                        <a class="nav-link" href="contact.html">Contact Us</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <div class="container text-center">
        <p class="motto">Where Journeys Find a Home..</p>
    </div>

    <div class="container text-center">
        <search class="search-bar">
            <input type="text" class="form-control" placeholder="Find Your Destination..">
        </search>
    </div>

    <!-- Code for whole Carousel -->
    <div class="container-fluid carousel">


        <div id="tour-car-1" class="carousel slide" data-bs-ride="carousel" data-bs-interval="3000">
            <!-- Indicator of carousel -->
            <div class="carousel-indicators">
                <button type="button" data-bs-target="#tour-car-1" data-bs-slide-to="0" class="active"></button>
                <button type="button" data-bs-target="#tour-car-1" data-bs-slide-to="1"></button>
                <button type="button" data-bs-target="#tour-car-1" data-bs-slide-to="2"></button>
            </div>
    
            <!--carousel main-->
            <div class="carousel-inner">
                <!-- putting all slides to carousel -->
                <div class="carousel-item active">
                    <img src="img/carousel-mt-cook-main.webp" alt="MtCook1" class="d-block" style="width:100%">
                    <div class="carousel-caption">
                        <h3>Mount Cook Trekking</h3>
                        <p></p>
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="img/carousel-mt-cook.webp" alt="MtCook2" class="d-block" style="width:100%">
                    <div class="carousel-caption">
                        <h3>Mount Cook Trekking</h3>
                        <p></p>
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="img/mt-cook-3.webp" alt="MtCook3" class="d-block" style="width:100%">
                    <div class="carousel-caption">
                        <h3>Mount Cook Trekking</h3>
                        <p></p>
                    </div>
                </div>
            </div>
            <!--Left and right control button -->
            <button class="carousel-control-prev" type="button" data-bs-target="#tour-car-1" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#tour-car-1" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>
        </div>
    </div>
    <div>
        <!-- Tour Selection Card -->
        <div class="card" style="width: 100%; padding: 30px; margin-top: 20px;">
            <h2 class="card-title">Select Your Tour Option</h2>
            <div style="text-align: center; margin: 20px 0;">
                <!-- Single -->
                <button class="btn" id="mtcook-single">Single - $6000</button>
                <span style="display:inline-block; width: 50px;"></span>
                <!-- Group -->
                <label for="people-count">Group (2-5): </label>
                <input type="number" id="people-count" min="2" max="5" value="2" style="width: 60px; padding: 8px; border-radius: 10px; border: none; margin-right: 10px;">                
                <button class="btn" id="mtcook-group">Group - $5700 each</button>
                <button class="btn" id="clear-btn" style="background-color: rgb(46, 0, 12);">Clear</button>
            </div>
              <!-- The Row Container -->
            <div class="row">
                <!-- Column 1 -->
                <div class="column">
                    <div class="card checkout-box">
                        <h2 class="card-title">👤 Customer Details</h2>
                        <label>Full Name</label>
                        <input type="text" id="customerName" placeholder="John Doe">
                        
                        <label>Email Address</label>
                        <input type="email" id="customerEmail" placeholder="john@example.com">
                        
                        <label>Phone Number</label>
                        <input type="tel" id="customerPhone" placeholder="123 456 789">
                    </div>
                </div>

                <!-- Column 2 -->
                <div class="column">
                    <div id="checkout-section" class="card checkout-box">
                        <h2 class="card-title">💳 Payment Details</h2>
                        <p class="checkout-text">Number of People: <strong>👥<span id="people-count-show">0</span></strong></p>
                        <p class="checkout-text">Total to pay: <strong>$<span id="final-amount">0</span></strong></p>
                        <div class="payment-fields">
                            <label>Cardholder Name</label>
                            <input type="text" id="cardName" placeholder="Enter name on card">
                            <label>Card Number (16 digits)</label>
                            <input type="text" id="cardNumber" maxlength="16" placeholder="1234 5678 9012 3456">
                            <label>Expiry Date</label>
                            <input type="text" id="expiry" placeholder="MM/YY">
                            <label>CVV (3 digits)</label>
                            <input type="text" id="cvv" maxlength="3" placeholder="123">
                            <button class="btn" onclick="processPayment()">Pay Now</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!--Connecting My js file-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
    <footer class="footer">
        <div class="container text-center">
            <div class="footer-socials mb-3">
                <a href="https://facebook.com/" class="footer-link"><img class="sm" src="img/facebook-new-2019-seeklogo.png" alt="facebook"> Facebook</a>
                <a href="https://instagram.com/" class="footer-link"><img class="sm" src="img/instagram-new-2016-seeklogo.png" alt="instagram"> Instagram</a>
                <a href="https://www.youtube.com/" class="footer-link"><img class="sm" src="img/youtube-icon-seeklogo.png" alt="youtube"> Youtube</a>
            </div>
            <p class="copyright-text mb-0">&copy; 2026 NONGOR. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
